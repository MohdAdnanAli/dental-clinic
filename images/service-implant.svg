<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="220" height="220">

  <!-- Background badge -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f9fd"/>
      <stop offset="100%" stop-color="#e6f2f8"/>
    </linearGradient>
  </defs>

  <circle cx="120" cy="120" r="110" fill="url(#bgGrad)"/>

  <!-- Tooth (refined molar shape) -->
  <path d="
    M80 95
    Q75 60 100 60
    Q115 75 120 70
    Q125 75 140 60
    Q165 60 160 95
    Q155 125 140 165
    Q130 185 120 185
    Q110 185 100 165
    Q85 125 80 95 Z"
    fill="#ffffff"
    stroke="#d6e6ef"
    stroke-width="2.5"
  />

  <!-- Implant (clean + centered) -->
  <rect x="110" y="135" width="20" height="45" rx="6" fill="#4da3d9"/>

  <!-- Implant neck -->
  <rect x="105" y="120" width="30" height="18" rx="6" fill="#7ec1e8"/>

  <!-- Subtle thread lines -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.7">
    <line x1="110" y1="145" x2="130" y2="145"/>
    <line x1="110" y1="155" x2="130" y2="155"/>
    <line x1="110" y1="165" x2="130" y2="165"/>
  </g>

  <!-- Medical plus badge -->
  <circle cx="170" cy="70" r="18" fill="#4da3d9"/>
  <rect x="162" y="68" width="16" height="4" rx="2" fill="#ffffff"/>
  <rect x="168" y="62" width="4" height="16" rx="2" fill="#ffffff"/>

  <!-- Highlight for premium feel -->
  <path d="M95 85 Q120 70 145 85"
        stroke="#eaf4fb"
        stroke-width="4"
        fill="none"
        opacity="0.8"/>

</svg>